<style>
        body {
            background: linear-gradient(rgba(24,29,56,.85), rgba(24,29,56,.85)),
                        url('img/carousel-1.jpg') center/cover no-repeat;
            min-height: 100vh;
        }

        
.login-wrapper {
    min-height: calc(100vh - 140px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 15px;
}
        .login-box {
            width: 100%;
            max-width: 420px;
            padding: 40px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .brand {
            text-align: center;
            margin-bottom: 20px;
        }

        .brand h2 {
            color: #06BBCC;
        }
        #registerForm {
    display: none;
}
    </style>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg bg-white navbar-light shadow sticky-top p-0">
        <a href="index.html" class="navbar-brand d-flex align-items-center px-4 px-lg-5">
            <h2 class="m-0 text-primary"><i class="fa fa-book me-3"></i>eLEARNING</h2>
        </a>
        <button type="button" class="navbar-toggler me-4" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarCollapse">
            <div class="navbar-nav ms-auto p-4 p-lg-0">
                <a href="index.html" class="nav-item nav-link ">Home</a>

                <a href="contact.html" class="nav-item nav-link">Contact</a>
            </div>
            <a href="login.html" class="btn btn-primary py-4 px-lg-5 d-none d-lg-block">Login<i class="fa fa-arrow-right ms-3"></i></a>
        </div>
    </nav>
<!-- Login Section -->
    <!-- LOGIN FORM -->
<div class="login-wrapper">
    <div class="login-box">

    <div class="brand">
        <h2><i class="fa fa-book me-2"></i>eLEARNING</h2>
        <p class="text-muted">Login / Register</p>
    </div>
<p id="msg" style="text-align:center; font-weight:600;"></p>

    <!-- LOGIN FORM -->
    <form id="loginForm">

        <div class="mb-3">
            <label>Email</label>
            <input type="email" id="email" class="form-control" placeholder="Enter email">
        </div>

        <div class="mb-3">
            <label>Password</label>
            <input type="password" id="password" class="form-control" placeholder="Enter password">
        </div>

       <div class="d-flex mb-3">
<button type="button" class="btn btn-primary w-50" onclick="login()">Login</button>
<button type="button" class="btn btn-outline-primary w-50" onclick="showRegister()">Register</button>
</div>

    </form>

    <hr>
    <!-- REGISTER FORM -->
    <form id="registerForm">

        <div class="mb-3">
            <label>Full Name</label>
            <input type="text" id="regName" class="form-control" placeholder="Enter name">
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input type="email" id="regEmail" class="form-control" placeholder="Enter email">
        </div>

        <div class="mb-3">
            <label>Password</label>
            <input type="password" id="regPassword" class="form-control" placeholder="Create password">
        </div>

        <div class="mb-3">
            <label>Confirm Password</label>
            <input type="password" id="regConfirm" class="form-control" placeholder="Confirm password">
        </div>

       <div class="d-flex mb-3">
<button type="button" class="btn btn-primary w-50" onclick="register()">Register</button>
<button type="button" class="btn btn-outline-primary w-50" onclick="showLogin()">Login</button>
    </div>

    </form>

</div></div>
